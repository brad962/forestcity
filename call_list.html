<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call List — Forest City AI Office</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
    --text: #e2e8f0; --muted: #64748b; --accent: #3b82f6;
    --green: #22c55e; --yellow: #f59e0b; --red: #ef4444;
    --purple: #a855f7; --cyan: #06b6d4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; }

  nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 32px; height: 52px; position: sticky; top: 0; z-index: 100; }
  nav .brand { font-weight: 700; font-size: 15px; color: var(--text); text-decoration: none; }
  nav a { color: var(--muted); text-decoration: none; font-size: 13px; transition: color .15s; }
  nav a:hover, nav a.active { color: var(--text); }

  .page-header { padding: 24px 24px 0; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .page-header h1 { font-size: 20px; font-weight: 700; }
  .btn { padding: 7px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; font-size: 13px; transition: all .15s; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }

  /* STATS */
  .stats-bar { display: flex; gap: 12px; padding: 16px 24px; flex-wrap: wrap; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 20px; min-width: 130px; }
  .stat-card .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
  .stat-card .value { font-size: 24px; font-weight: 700; }
  .stat-card .value.green { color: var(--green); }
  .stat-card .value.yellow { color: var(--yellow); }
  .stat-card .value.blue { color: var(--accent); }

  /* FILTERS */
  .filters { padding: 0 24px 16px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .filter-btn { padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-size: 12px; transition: all .15s; }
  .filter-btn:hover, .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .search-box { padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 13px; width: 220px; }
  .search-box:focus { outline: none; border-color: var(--accent); }

  /* PROGRESS BAR */
  .progress-wrap { padding: 0 24px 20px; }
  .progress-bar-outer { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; height: 10px; overflow: hidden; }
  .progress-bar-inner { height: 100%; background: var(--green); border-radius: 8px; transition: width .4s ease; }
  .progress-label { font-size: 12px; color: var(--muted); margin-top: 6px; }

  /* CALL CARDS */
  .list-wrap { padding: 0 24px 40px; display: flex; flex-direction: column; gap: 10px; }

  .call-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    display: grid;
    grid-template-columns: 44px 1fr auto;
    gap: 16px;
    align-items: center;
    transition: border-color .15s, opacity .2s;
    cursor: default;
  }
  .call-card:hover { border-color: #3a3d4a; }
  .call-card.called { opacity: 0.45; }
  .call-card.called .card-company { text-decoration: line-through; color: var(--muted); }

  /* Checkbox */
  .call-check {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: all .15s;
    flex-shrink: 0;
  }
  .call-check:hover { border-color: var(--green); }
  .call-check.done { background: var(--green); border-color: var(--green); color: #fff; }

  /* Card body */
  .card-body { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .card-top { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .card-company { font-weight: 600; font-size: 15px; }
  .card-name { color: var(--muted); font-size: 13px; }
  .card-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .card-phone { color: var(--accent); font-size: 13px; font-weight: 500; text-decoration: none; }
  .card-phone:hover { text-decoration: underline; }
  .card-email { color: var(--muted); font-size: 12px; }
  .card-seq { font-size: 11px; color: var(--muted); background: #1e2130; padding: 2px 8px; border-radius: 10px; border: 1px solid var(--border); }
  .card-notes { font-size: 12px; color: var(--yellow); margin-top: 2px; }

  /* Right side actions */
  .card-actions { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; flex-shrink: 0; }
  .badge-called { font-size: 11px; color: var(--green); background: rgba(34,197,94,.1); padding: 3px 10px; border-radius: 10px; border: 1px solid rgba(34,197,94,.2); }
  .badge-pending { font-size: 11px; color: var(--yellow); background: rgba(245,158,11,.1); padding: 3px 10px; border-radius: 10px; border: 1px solid rgba(245,158,11,.2); }
  .call-note-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 12px;
    padding: 4px 8px;
    width: 180px;
    resize: none;
  }
  .call-note-input:focus { outline: none; border-color: var(--accent); }

  .empty-state { text-align: center; padding: 60px 24px; color: var(--muted); }
  .empty-state h2 { font-size: 18px; margin-bottom: 8px; color: var(--text); }

  .loading { text-align: center; padding: 60px; color: var(--muted); }
  .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); padding: 8px 0 4px; }

  /* INFO CARD MODAL */
  .modal-backdrop {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.6);
    z-index: 200;
    align-items: center; justify-content: center;
  }
  .modal-backdrop.open { display: flex; }
  .info-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 32px;
    width: 380px;
    max-width: 90vw;
    position: relative;
    box-shadow: 0 24px 60px rgba(0,0,0,.5);
  }
  .info-card-close {
    position: absolute; top: 16px; right: 16px;
    background: none; border: none; color: var(--muted);
    font-size: 18px; cursor: pointer; line-height: 1;
    padding: 4px 8px; border-radius: 6px;
    transition: color .15s, background .15s;
  }
  .info-card-close:hover { color: var(--text); background: #2a2d3a; }
  .info-card-avatar {
    width: 52px; height: 52px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--purple));
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 700; color: #fff;
    margin-bottom: 16px;
  }
  .info-card-company { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .info-card-name { font-size: 14px; color: var(--muted); margin-bottom: 20px; }
  .info-card-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .info-card-row:last-child { border-bottom: none; }
  .info-card-row .ic-label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .05em; width: 56px; flex-shrink: 0; }
  .info-card-row a { color: var(--accent); text-decoration: none; }
  .info-card-row a:hover { text-decoration: underline; }
  .info-card-row .ic-empty { color: var(--muted); font-style: italic; }
  .info-card-actions { display: flex; gap: 10px; margin-top: 20px; }
  .ic-btn { flex: 1; padding: 9px 0; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text); cursor: pointer; font-size: 13px; font-weight: 500; transition: all .15s; text-align: center; text-decoration: none; display: block; }
  .ic-btn:hover { border-color: var(--accent); color: var(--accent); }
  .ic-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .ic-btn.primary:hover { background: #2563eb; }
</style>
</head>
<body>

<nav>
  <a class="brand" href="dashboard.html">🏢 FC AI Office</a>
  <a href="dashboard.html">Dashboard</a>
  <a href="pipeline.html">Pipeline</a>
  <a href="call_list.html" class="active">Call List</a>
  <a href="contacts.html">Contacts</a>
  <a href="connect.html">Connect</a>
</nav>

<div class="page-header">
  <h1>📞 Call List</h1>
  <div style="display:flex;gap:8px;align-items:center">
    <button class="btn" onclick="toggleCalled()">
      <span id="toggle-label">Hide Called</span>
    </button>
    <button class="btn" onclick="loadAll()">↻ Refresh</button>
  </div>
</div>

<div class="stats-bar">
  <div class="stat-card"><div class="label">To Call</div><div class="value yellow" id="stat-pending">—</div></div>
  <div class="stat-card"><div class="label">Called</div><div class="value green" id="stat-called">—</div></div>
  <div class="stat-card"><div class="label">Total</div><div class="value blue" id="stat-total">—</div></div>
</div>

<div class="progress-wrap">
  <div class="progress-bar-outer"><div class="progress-bar-inner" id="progress-bar" style="width:0%"></div></div>
  <div class="progress-label" id="progress-label">Loading...</div>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
  <button class="filter-btn" onclick="setFilter('property_manager', this)">Property Managers</button>
  <button class="filter-btn" onclick="setFilter('contractor', this)">Contractors</button>
  <button class="filter-btn" onclick="setFilter('realtor', this)">Realtors</button>
  <input class="search-box" type="text" placeholder="Search name, company..." oninput="setSearch(this.value)" />
</div>

<div class="list-wrap" id="list-wrap">
  <div class="loading">Loading call list...</div>
</div>

<!-- INFO CARD MODAL -->
<div class="modal-backdrop" id="modal-backdrop" onclick="closeModal(event)">
  <div class="info-card" id="info-card">
    <button class="info-card-close" onclick="closeInfoCard()">✕</button>
    <div class="info-card-avatar" id="ic-avatar">?</div>
    <div class="info-card-company" id="ic-company">—</div>
    <div class="info-card-name" id="ic-name"></div>
    <div class="info-card-row">
      <span class="ic-label">Phone</span>
      <span id="ic-phone"><span class="ic-empty">Not on file</span></span>
    </div>
    <div class="info-card-row">
      <span class="ic-label">Email</span>
      <span id="ic-email"><span class="ic-empty">Not on file</span></span>
    </div>
    <div class="info-card-row">
      <span class="ic-label">Type</span>
      <span id="ic-type">—</span>
    </div>
    <div class="info-card-row">
      <span class="ic-label">Stage</span>
      <span id="ic-stage">—</span>
    </div>
    <div class="info-card-row" id="ic-notes-row" style="display:none">
      <span class="ic-label">Notes</span>
      <span id="ic-notes" style="color:var(--yellow)"></span>
    </div>
    <div class="info-card-actions">
      <a id="ic-call-btn" href="#" class="ic-btn primary">📞 Call</a>
      <a id="ic-sms-btn" href="#" class="ic-btn">💬 Text</a>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:3737';
let allContacts = [];
let callLog = {};
let filterType = 'all';
let searchQuery = '';
let showCalled = true;
let saveTimers = {};

async function loadAll() {
  try {
    const [pRes, cRes] = await Promise.all([
      fetch(`${API}/api/pipeline`),
      fetch(`${API}/api/calls`),
    ]);
    const pData = await pRes.json();
    callLog = await cRes.json();

    // Only show contacts that have been emailed (in a Mixmax sequence)
    // OR manual contacts (already called by Bradley)
    allContacts = (pData.contacts || []).filter(c => {
      if (c.source === 'manual') return true;         // imported — already called
      return c.sequence && c.sequence !== 'Manual Import'; // in a real sequence = emailed
    });

    renderList();
  } catch(e) {
    document.getElementById('list-wrap').innerHTML =
      '<div class="empty-state"><h2>Could not reach server</h2><p>Make sure server.py is running on port 3737</p></div>';
  }
}

function getKey(c) {
  return c.source === 'manual' ? (c.id || c.phone) : c.email;
}

function isCalled(c) {
  const key = getKey(c);
  return !!(callLog[key] && callLog[key].called);
}

function getCallNote(c) {
  const key = getKey(c);
  return (callLog[key] && callLog[key].notes) || '';
}

function setFilter(type, btn) {
  filterType = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function setSearch(val) {
  searchQuery = val.toLowerCase();
  renderList();
}

function toggleCalled() {
  showCalled = !showCalled;
  document.getElementById('toggle-label').textContent = showCalled ? 'Hide Called' : 'Show Called';
  renderList();
}

function renderList() {
  let contacts = allContacts;

  // Filter by type
  if (filterType !== 'all') {
    contacts = contacts.filter(c => c.lead_type === filterType);
  }

  // Search
  if (searchQuery) {
    contacts = contacts.filter(c =>
      (c.name || '').toLowerCase().includes(searchQuery) ||
      (c.company || '').toLowerCase().includes(searchQuery) ||
      (c.phone || '').includes(searchQuery) ||
      (c.email || '').toLowerCase().includes(searchQuery)
    );
  }

  const called   = contacts.filter(c => isCalled(c));
  const pending  = contacts.filter(c => !isCalled(c));

  // Stats
  const totalAll   = allContacts.length;
  const calledAll  = allContacts.filter(c => isCalled(c)).length;
  const pendingAll = totalAll - calledAll;
  document.getElementById('stat-pending').textContent = pendingAll;
  document.getElementById('stat-called').textContent  = calledAll;
  document.getElementById('stat-total').textContent   = totalAll;
  const pct = totalAll > 0 ? Math.round(calledAll / totalAll * 100) : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${calledAll} of ${totalAll} called (${pct}%)`;

  const wrap = document.getElementById('list-wrap');
  if (contacts.length === 0) {
    wrap.innerHTML = '<div class="empty-state"><h2>No contacts match</h2><p>Try a different filter or search.</p></div>';
    return;
  }

  let html = '';

  // Pending first
  if (pending.length > 0) {
    html += `<div class="section-label">To Call — ${pending.length}</div>`;
    html += pending.map(c => cardHTML(c)).join('');
  }

  // Called (optionally hidden)
  if (called.length > 0 && showCalled) {
    html += `<div class="section-label" style="margin-top:16px">Called — ${called.length}</div>`;
    html += called.map(c => cardHTML(c)).join('');
  }

  wrap.innerHTML = html;
}

function cardHTML(c) {
  const key     = getKey(c);
  const called  = isCalled(c);
  const note    = getCallNote(c);
  const name    = c.name ? `<span class="card-name">${c.name}</span>` : '';
  const phone   = c.phone
    ? `<a class="card-phone" href="tel:${c.phone}">${c.phone}</a>`
    : '';
  const email   = c.email ? `<span class="card-email">${c.email}</span>` : '';
  const seq     = `<span class="card-seq">${c.lead_type === 'property_manager' ? 'Prop. Manager' : c.lead_type === 'realtor' ? 'Realtor' : 'Contractor'}</span>`;
  const badge   = called
    ? `<span class="badge-called">✓ Called</span>`
    : `<span class="badge-pending">To Call</span>`;
  const cardNotes = c.notes ? `<div class="card-notes">📌 ${c.notes}</div>` : '';
  const idx     = allContacts.indexOf(c);

  return `
  <div class="call-card ${called ? 'called' : ''}" id="card-${key.replace(/[@.]/g,'-')}">
    <div class="call-check ${called ? 'done' : ''}" onclick="toggleCall('${key}', this)" title="${called ? 'Mark uncalled' : 'Mark as called'}">
      ${called ? '✓' : ''}
    </div>
    <div class="card-body">
      <div class="card-top">
        <span class="card-company" onclick="openInfoCard(${idx})" style="cursor:pointer" title="View contact info">${c.company || '—'}</span>
        ${name}
        ${seq}
      </div>
      <div class="card-meta">
        ${phone}
        ${email}
      </div>
      ${cardNotes}
    </div>
    <div class="card-actions">
      ${badge}
      <textarea class="call-note-input" rows="2" placeholder="Call notes..."
        onchange="saveNote('${key}', this.value)">${note}</textarea>
    </div>
  </div>`;
}

function openInfoCard(idx) {
  const c = allContacts[idx];
  if (!c) return;

  const initials = (c.company || c.name || '?').charAt(0).toUpperCase();
  document.getElementById('ic-avatar').textContent = initials;
  document.getElementById('ic-company').textContent = c.company || '—';
  document.getElementById('ic-name').textContent = c.name || '';

  const phoneEl = document.getElementById('ic-phone');
  phoneEl.innerHTML = c.phone
    ? `<a href="tel:${c.phone}">${c.phone}</a>`
    : '<span class="ic-empty">Not on file</span>';

  const emailEl = document.getElementById('ic-email');
  emailEl.innerHTML = c.email
    ? `<a href="mailto:${c.email}">${c.email}</a>`
    : '<span class="ic-empty">Not on file</span>';

  document.getElementById('ic-type').textContent =
    c.lead_type === 'property_manager' ? 'Property Manager' :
    c.lead_type === 'realtor' ? 'Realtor' : 'Contractor';
  document.getElementById('ic-stage').textContent = c.stage || '—';

  const notesRow = document.getElementById('ic-notes-row');
  if (c.notes) {
    document.getElementById('ic-notes').textContent = c.notes;
    notesRow.style.display = 'flex';
  } else {
    notesRow.style.display = 'none';
  }

  document.getElementById('ic-call-btn').href = c.phone ? `tel:${c.phone}` : '#';
  document.getElementById('ic-sms-btn').href  = c.phone ? `sms:${c.phone}` : '#';

  document.getElementById('modal-backdrop').classList.add('open');
}

function closeInfoCard() {
  document.getElementById('modal-backdrop').classList.remove('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-backdrop')) closeInfoCard();
}

async function toggleCall(key, el) {
  const wasCalled = el.classList.contains('done');
  const nowCalled = !wasCalled;
  const today = new Date().toISOString().split('T')[0];

  // Optimistic UI
  el.classList.toggle('done', nowCalled);
  el.textContent = nowCalled ? '✓' : '';
  if (callLog[key]) {
    callLog[key].called = nowCalled;
  } else {
    callLog[key] = { called: nowCalled, called_at: today, notes: '' };
  }

  try {
    await fetch(`${API}/api/calls`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key, called: nowCalled, called_at: today, notes: callLog[key]?.notes || '' }),
    });
  } catch(e) {}

  // Re-render after short delay so the card animates out
  setTimeout(renderList, 300);
}

async function saveNote(key, value) {
  clearTimeout(saveTimers[key]);
  saveTimers[key] = setTimeout(async () => {
    if (!callLog[key]) callLog[key] = { called: false, called_at: '', notes: '' };
    callLog[key].notes = value;
    try {
      await fetch(`${API}/api/calls`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key, called: callLog[key].called || false, notes: value }),
      });
    } catch(e) {}
  }, 600);
}

loadAll();
</script>
</body>
</html>
