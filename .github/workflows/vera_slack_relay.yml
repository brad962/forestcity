name: Vera Slack Relay

on:
  push:
    branches: [main]
    paths:
      - 'outputs/vera/pending_slack_messages.md'

jobs:
  post-to-slack:
    runs-on: ubuntu-latest
    # Only fire when Vera Cole is the commit author
    if: contains(github.event.head_commit.author.name, 'Vera')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read and post Slack messages
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_OFFICE }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request, sys

          webhook = os.environ.get('SLACK_WEBHOOK', '')
          if not webhook:
              print('ERROR: SLACK_WEBHOOK_OFFICE secret not configured in GitHub repo settings.')
              print('Go to: repo Settings → Secrets and variables → Actions → New repository secret')
              print('Name: SLACK_WEBHOOK_OFFICE  Value: your Slack webhook URL')
              sys.exit(1)

          pending_file = 'outputs/vera/pending_slack_messages.md'
          try:
              content = open(pending_file).read().strip()
          except FileNotFoundError:
              print('No pending_slack_messages.md found — nothing to post.')
              sys.exit(0)

          if not content or len(content) < 10:
              print('pending_slack_messages.md is empty — nothing to post.')
              sys.exit(0)

          messages = [m.strip() for m in content.split('---') if m.strip() and len(m.strip()) > 10]
          print(f'Found {len(messages)} messages to post.')

          posted = 0
          for msg in messages:
              try:
                  payload = json.dumps({'text': msg[:3000]}).encode()
                  req = urllib.request.Request(
                      webhook, payload,
                      {'Content-Type': 'application/json'}
                  )
                  urllib.request.urlopen(req, timeout=10)
                  posted += 1
                  print(f'  ✅ Posted message {posted}')
              except Exception as e:
                  print(f'  ❌ Failed to post message: {e}')

          print(f'Done: {posted}/{len(messages)} messages posted to Slack.')
          PYEOF

      - name: Clear pending messages after posting
        run: |
          echo "" > outputs/vera/pending_slack_messages.md

      - name: Commit cleared file
        run: |
          git config user.email "vera@forestcitypowerwashing.com"
          git config user.name "Vera Cole"
          git add outputs/vera/pending_slack_messages.md
          git diff --staged --quiet || git commit -m "Vera Relay: cleared pending Slack messages after GitHub Action post"
          git push origin main || echo "Nothing to push (file already empty)"
